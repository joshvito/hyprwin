# ============================================================
# HyprWin ~/.config/hypr/hyprland.conf
# Tiling window manager for Windows 11 (Hyprland-compatible)
# Shares the same config format as Linux Hyprland.
# ============================================================

# --- Variables ---
$terminal = cmd.exe
$menu = cmd.exe /c start /B "" wt.exe
$filemanager = explorer.exe
$browser = msedge.exe

# --- General settings ---
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    layout = dwindle          # dwindle, rows, or columns
    no_cursor_warps = false
    resize_on_border = false
}

# --- Decorations (visual — limited on Windows) ---
decoration {
    rounding = 4
    shadow = false
}

# --- Input ---
input {
    kb_layout = us
    follow_mouse = 1
}

# --- Workspaces ---
workspaces = 5

# Window rules
windowrule = float, class:^(Calculator)$
windowrule = float, title:^(Calculator)$
windowrule = float, class:^(TaskManagerWindow)$
windowrule = float, class:^(Shell_TrayWnd)$
windowrule = float, title:^(Open File.*)$
windowrule = float, title:^(Save As.*)$
windowrule = float, class:^(#32770)$

# --- Keybinds ---
# NOTE: modmask combos: SUPER, ALT, CTRL, SHIFT, or combined like "SUPER SHIFT"
# Key names: A-Z, 0-9, F1-F24, RETURN, SPACE, TAB, ESCAPE, etc.

# Launch
bind = SUPER, RETURN, exec, $terminal
bind = SUPER, E, exec, $filemanager
bind = SUPER, SPACE, exec, $menu
bind = SUPER, B, exec, $browser

# Kill active window
bind = SUPER, Q, killactive

# Workspace switching
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5

# Move window to workspace
bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5

# Navigation
bind = SUPER, LEFT, movefocus, left
bind = SUPER, RIGHT, movefocus, right
bind = SUPER, UP, movefocus, up
bind = SUPER, DOWN, movefocus, down

# Move windows in layout
bind = SUPER SHIFT, LEFT, movewindow, left
bind = SUPER SHIFT, RIGHT, movewindow, right
bind = SUPER SHIFT, UP, movewindow, up
bind = SUPER SHIFT, DOWN, movewindow, down

# Resize (adjusts master split ratio)
bind = SUPER, L, resizeactive, right 10
bind = SUPER, H, resizeactive, left 10

# Layout controls
bind = SUPER, TAB, cyclenext, next
bind = SUPER, F, fullscreen
bind = SUPER, V, togglefloating

# Master factor shortcuts
bind = SUPER, M, splitratio, 0.55
bind = SUPER SHIFT, M, splitratio, 0.45

# Auto-start (exec-once)
exec-once = start /B "" wt.exe
